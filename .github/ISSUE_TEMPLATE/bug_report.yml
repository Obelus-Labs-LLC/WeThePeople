---
name: Bug Report
description: Report a bug or data issue
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: sector
    attributes:
      label: Which sector?
      options:
        - Politics
        - Finance
        - Health
        - Technology
        - Energy
        - Mobile App
        - General / Backend
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: What should have happened instead
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click on...\n3. See error"
  - type: input
    id: url
    attributes:
      label: Page URL (if applicable)
      placeholder: https://...
