---
name: Feature Request
description: Suggest a new feature or data source
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: type
    attributes:
      label: What type of feature?
      options:
        - New data source / API
        - New visualization
        - UI improvement
        - Mobile app feature
        - New sector or entity tracking
        - Performance improvement
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this valuable?
      placeholder: How does this help track money in politics or corporate influence?
